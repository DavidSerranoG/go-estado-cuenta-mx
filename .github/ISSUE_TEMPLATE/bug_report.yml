name: Reporte de bug
description: Reporta un parseo incorrecto o un comportamiento inesperado del extractor en un layout soportado.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Usa solo texto sanitizado o fixtures sanitizados.

        No adjuntes estados de cuenta reales ni sin redacción en este issue.
  - type: dropdown
    id: bank
    attributes:
      label: Banco
      description: Selecciona el banco del estado de cuenta afectado.
      options:
        - BBVA
        - HSBC
        - Otro / no soportado
    validations:
      required: true
  - type: input
    id: layout
    attributes:
      label: Layout
      description: Nombra el layout del estado de cuenta si lo conoces.
      placeholder: tarjeta de crédito, estado de cuenta, Cuenta Flexible
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Resultado esperado
      description: Describe la salida normalizada o el comportamiento que esperabas.
      placeholder: El parser debería detectar 14 transacciones y el saldo final.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Resultado actual
      description: Incluye el error devuelto, advertencias o campos incorrectos.
      placeholder: ParsePDF devolvió no transactions found después del OCR de rescate.
    validations:
      required: true
  - type: textarea
    id: sanitized_input
    attributes:
      label: Entrada sanitizada
      description: Pega texto extraído sanitizado o enlaza a una ruta de fixture sanitizado dentro del repositorio.
      placeholder: Pega aquí el texto sanitizado o referencia testdata/public-pdfs/...
      render: text
    validations:
      required: true
  - type: dropdown
    id: ocr
    attributes:
      label: Configuración de OCR
      description: Selecciona la ruta de extracción que usaste.
      options:
        - Solo cadena de extractores por defecto
        - OCR de rescate habilitado
        - Cadena de extractores personalizada
        - No estoy seguro
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Entorno
      description: Incluye la versión del módulo o commit, la versión de Go y el sistema operativo si aplica.
      placeholder: main @ abc123, Go 1.25.x, macOS 15
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmaciones
      options:
        - label: No adjunté estados de cuenta reales ni sin redacción.
          required: true
        - label: Incluí suficiente entrada sanitizada para reproducir el problema.
          required: true
