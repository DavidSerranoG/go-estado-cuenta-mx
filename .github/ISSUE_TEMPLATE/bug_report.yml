name: Bug report
description: Report an incorrect parse or extractor behavior for a supported layout.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Use sanitized text or sanitized fixtures only.

        Do not attach real or unredacted bank statements to this issue.
  - type: dropdown
    id: bank
    attributes:
      label: Bank
      description: Select the bank for the affected statement.
      options:
        - BBVA
        - HSBC
        - Other / unsupported
    validations:
      required: true
  - type: input
    id: layout
    attributes:
      label: Layout
      description: Name the statement layout if you know it.
      placeholder: credit card, account statement, Cuenta Flexible
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: Describe the normalized output or behavior you expected.
      placeholder: The parser should detect 14 transactions and the closing balance.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: Include the returned error, warnings, or incorrect fields.
      placeholder: ParsePDF returned no transactions found after OCR rescue.
    validations:
      required: true
  - type: textarea
    id: sanitized_input
    attributes:
      label: Sanitized input
      description: Paste sanitized extracted text or link to a sanitized fixture path in the repository.
      placeholder: Paste sanitized text here or reference testdata/public-pdfs/...
      render: text
    validations:
      required: true
  - type: dropdown
    id: ocr
    attributes:
      label: OCR configuration
      description: Select the extraction path you used.
      options:
        - Default extractor chain only
        - Rescue OCR enabled
        - Custom extractor chain
        - Not sure
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include module version or commit, Go version, and OS if relevant.
      placeholder: main @ abc123, Go 1.25.x, macOS 15
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: I did not attach real or unredacted bank statements.
          required: true
        - label: I included enough sanitized input to reproduce the problem.
          required: true
